# This is a basic workflow to keep a fork updated.

name: Sync Fork

# Controls when the action will run.
on:
  repository_dispatch:
    types: [update-fork] # Listens for a specific custom event
  workflow_dispatch: # Allows manual runs
jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          # We must use a Personal Access Token here to allow the Action to push commits.
          # The GITHUB_TOKEN has read-only permissions and cannot trigger other workflows.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch all history for all branches and tags
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Actions Sync'
          git config --global user.email 'actions@github.com'

      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/AliMustafa731/AMK-Hurryapp-3.git

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Merge Upstream Changes
        run: |
          # Get the default branch name of the fork
          DEFAULT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Default branch is $DEFAULT_BRANCH"
          
          # Merge changes from the upstream's corresponding branch
          git merge "upstream/$DEFAULT_BRANCH" --ff-only || (
            echo "Fast-forward merge failed. A manual merge may be required."
            exit 1
          )

      - name: Push Changes
        run: git push origin
